<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>끝말잇기</title>
        <style>
            :root{--bg:#071026;--card:#0b1220;--accent:#06b6d4;--muted:#94a3b8}
            *{box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans KR',sans-serif}
            body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#071026,#07162a);color:#e6eef6}
            .wrap{width:100%;max-width:800px;padding:20px}
            .card{background:rgba(255,255,255,0.03);padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,0.04)}
            h1{margin:0 0 10px;font-size:22px}
            .row{display:flex;gap:12px;align-items:center}
            .current{font-size:18px;font-weight:700}
            .small{color:var(--muted);font-size:13px}
            .controls{margin-top:12px;display:flex;gap:8px;align-items:center}
            input[type=text]{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
            button{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--accent);cursor:pointer}
            .info{margin-top:12px;font-size:14px}
            .used{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px}
            .chip{background:rgba(255,255,255,0.03);padding:6px 8px;border-radius:999px;font-size:13px}
            .meta{display:flex;gap:12px;margin-top:12px}
            .meta .box{background:rgba(255,255,255,0.02);padding:8px 10px;border-radius:8px}
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="card">
                <h1>끝말잇기 게임</h1>

                <div class="row" style="justify-content:space-between">
                    <div>
                        <div class="small">현재 단어</div>
                        <div class="current" id="currentWord">-</div>
                    </div>
                    <div style="text-align:right">
                        <div class="small">라운드</div>
                        <div id="round">0</div>
                    </div>
                </div>

                <div class="controls">
                    <input id="wordInput" type="text" placeholder="단어를 입력하세요 (예: 사과)" autocomplete="off" />
                    <button id="submitBtn">제출</button>
                    <button id="giveUpBtn">포기</button>
                    <button id="resetBtn">리셋</button>
                </div>

                <div class="info" id="message">컴퓨터가 시작합니다.</div>
                <div class="small" style="margin-top:8px;color:var(--muted)">로컬 서버로 실행하면 같은 폴더의 <code>wordslistUnique.txt</code>를 자동으로 불러옵니다.</div>

                                <div class="meta">
                    <div class="box">플레이어 승: <span id="playerWins">0</span></div>
                    <div class="box">컴퓨터 승: <span id="computerWins">0</span></div>
                    <div class="box">사용된 단어: <span id="usedCount">0</span></div>
                </div>

                                <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
                                    <input id="fileInput" type="file" accept=".txt" style="color:inherit" />
                                    <button id="importBtn">사전 불러오기 / 추가</button>
                                    <input id="urlInput" type="text" placeholder="원격 단어 파일 URL (.txt)" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit" />
                                    <button id="fetchBtn">인터넷에서 불러오기</button>
                                </div>

                                <div class="used" id="usedList" aria-live="polite"></div>
            </div>
        </div>

        <script>
            (function(){
                // 확장된 사전(예시). 파일로 더 추가 가능.
                const DICT = [
                    '사과','과일','일기','기차','차표','표지','지갑','압정','정원','원숭이','이불','불고기','기름','음악','학교','교실','실내','내일','일본','본드','드라마','마음','음식','식탁','탁자','자전거','거북이','이사','사전','전화','화분','분수','수박','박수','수영','영화','화장실','실패','패션','션윈','윈도','도서관','관심','심장','장미','미술','술잔','잔디',
                    '강아지','고양이','나무','구름','바다','산책','우유','커피','주스','음료','전화기','컴퓨터','모니터','키보드','마우스','인터넷','웹사이트','브라우저','프로그램','코드','개발','디자인','아트','영어','한국어','음악가','가수','밴드','콘서트','영화관','배우','감독','시나리오','소설','작가','시인','그림','화가','목공','건축','도시','마을','시장','가게','음식점','식당','요리사','주방','재료','채소','과자','빵','케이크','초콜릿','사탕','우산','신발','양말','모자','안경','시계','가방','지우개','연필','펜','책상','의자','창문','문서','사진','카메라','필름','라디오','텔레비전','드라이버','공구','전구','램프','가전','세탁기','냉장고','에어컨','히터','전자레인지','오븐','자동차','비행기','기계','공장','도로','교통','버스','지하철','택시','운전사','승객','여행','관광','호텔','예약','지도','길','목적지','출발','도착','시간','날짜','달력'
                ];

                const dictSet = new Set(DICT);
                const localDictFile = 'wordslistUnique.txt';
                let used = new Set();
                let currentWord = '';
                let round = 0;
                let playerWins = 0;
                let computerWins = 0;
                let localAdded = 0;

                const el = id => document.getElementById(id);
                const currentEl = el('currentWord');
                const msgEl = el('message');
                const inputEl = el('wordInput');
                const submitBtn = el('submitBtn');
                const giveUpBtn = el('giveUpBtn');
                const resetBtn = el('resetBtn');
                const usedListEl = el('usedList');
                const roundEl = el('round');
                const playerWinsEl = el('playerWins');
                const computerWinsEl = el('computerWins');
                const usedCountEl = el('usedCount');
                const fileInput = el('fileInput');
                const importBtn = el('importBtn');
                const urlInput = el('urlInput');
                const fetchBtn = el('fetchBtn');

                async function loadLocalDictionary(){
                    try{
                        const resp = await fetch(localDictFile);
                        if(!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
                        const text = await resp.text();
                        const words = text.split(/\r?\n|[,，\s]+/).map(s=>s.trim()).filter(Boolean);
                        words.forEach(w=>{ if(!dictSet.has(w)){ DICT.push(w); dictSet.add(w); localAdded++; }});
                    }catch(err){
                        console.warn('Local dictionary load failed:', err);
                    }
                }

                function pickRandomStart(){
                    const arr = Array.from(dictSet);
                    return arr[Math.floor(Math.random()*arr.length)];
                }

                function lastChar(word){return word[word.length-1];}
                function firstChar(word){return word[0];}

                function updateUI(){
                    currentEl.textContent = currentWord || '-';
                    roundEl.textContent = round;
                    playerWinsEl.textContent = playerWins;
                    computerWinsEl.textContent = computerWins;
                    usedCountEl.textContent = used.size;
                    usedListEl.innerHTML = '';
                    Array.from(used).forEach(w=>{
                        const d = document.createElement('div'); d.className='chip'; d.textContent=w; usedListEl.appendChild(d);
                    });
                }

                function computerMove(startChar){
                    // 사전에서 시작 문자에 맞는 단어 중 사용되지 않은 것 선택
                    for(const w of DICT){
                        if(firstChar(w)===startChar && !used.has(w)) return w;
                    }
                    return null;
                }

                                // 파일 또는 붙여넣기로 사전 확장
                                importBtn.addEventListener('click', ()=>{
                                    if(fileInput.files && fileInput.files.length){
                                        const f = fileInput.files[0];
                                        const reader = new FileReader();
                                        reader.onload = ()=>{
                                            const txt = reader.result || '';
                                            const words = txt.split(/\r?\n|[,，\s]+/).map(s=>s.trim()).filter(Boolean);
                                            let added = 0;
                                            words.forEach(w=>{ if(!dictSet.has(w)){ DICT.push(w); dictSet.add(w); added++; }});
                                            msgEl.textContent = `사전에 ${added}개 단어를 추가했습니다.`;
                                            updateUI();
                                        };
                                        reader.readAsText(f,'utf-8');
                                    } else {
                                        const paste = prompt('추가할 단어들을 줄바꿈 또는 쉼표로 입력하세요:');
                                        if(!paste) return;
                                        const words = paste.split(/\r?\n|[,，\s]+/).map(s=>s.trim()).filter(Boolean);
                                        let added = 0;
                                        words.forEach(w=>{ if(!dictSet.has(w)){ DICT.push(w); dictSet.add(w); added++; }});
                                        msgEl.textContent = `사전에 ${added}개 단어를 추가했습니다.`;
                                        updateUI();
                                    }
                                });

                function startGame(){
                    used.clear();
                    currentWord = pickRandomStart();
                    used.add(currentWord);
                    round = 1;
                    msgEl.textContent = (localAdded ? `wordslistUnique.txt에서 ${localAdded}개 단어를 불러왔습니다. ` : '') + '컴퓨터가 시작했습니다: ' + currentWord;
                    updateUI();
                }

                submitBtn.addEventListener('click', ()=>{
                    const val = inputEl.value.trim();
                    if(!val){ msgEl.textContent='단어를 입력하세요.'; return; }
                    if(used.has(val)){ msgEl.textContent='이미 사용된 단어입니다.'; return; }
                    if(!dictSet.has(val)) { msgEl.textContent='사전에 없는 단어입니다. 목록에 있는 단어만 사용하세요.'; return; }
                    // 첫 글자 검사
                    if(firstChar(val) !== lastChar(currentWord)){
                        msgEl.textContent = `올바르지 않은 시작 문자입니다. '${lastChar(currentWord)}'로 시작해야 합니다.`;
                        return;
                    }
                    // 플레이어 유효
                    used.add(val);
                    round++;
                    // 컴퓨터 응답
                    const need = lastChar(val);
                    const reply = computerMove(need);
                    if(!reply){
                        playerWins++;
                        msgEl.textContent = `컴퓨터가 '${need}'로 시작하는 단어를 못 찾았습니다. 당신 승리!`;
                        currentWord = val;
                        updateUI();
                        inputEl.value='';
                        return;
                    }
                    // 컴퓨터가 답함
                    used.add(reply);
                    currentWord = reply;
                    msgEl.textContent = `컴퓨터: ${reply}  (다음: '${lastChar(reply)}'로 시작)`;
                    round++;
                    updateUI();
                    inputEl.value='';
                });
                                // 원격 URL에서 단어 목록 불러오기
                                fetchBtn.addEventListener('click', async ()=>{
                                    const url = urlInput.value.trim();
                                    if(!url){ msgEl.textContent='URL을 입력하세요.'; return; }
                                    msgEl.textContent = '원격에서 불러오는 중... 잠시만요.';
                                    try{
                                        const resp = await fetch(url);
                                        if(!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
                                        const txt = await resp.text();
                                        const words = txt.split(/\r?\n|[,，\s]+/).map(s=>s.trim()).filter(Boolean);
                                        let added = 0;
                                        words.forEach(w=>{ if(!dictSet.has(w)){ DICT.push(w); dictSet.add(w); added++; }});
                                        msgEl.textContent = `원격에서 ${added}개 단어를 추가했습니다.`;
                                        updateUI();
                                    }catch(err){
                                        msgEl.textContent = '불러오기 실패: ' + err.message + ' (CORS 또는 네트워크 문제일 수 있음)';
                                    }
                                });

                giveUpBtn.addEventListener('click', ()=>{
                    computerWins++;
                    msgEl.textContent = '플레이어가 포기했습니다. 컴퓨터 승리.';
                    round++;
                    updateUI();
                });

                resetBtn.addEventListener('click', ()=>{
                    used.clear(); playerWins=0; computerWins=0; round=0; currentWord='';
                    msgEl.textContent='게임을 리셋했습니다.'; inputEl.value=''; updateUI();
                    startGame();
                });

                // 엔터로 제출
                inputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitBtn.click(); });

                // 시작
                async function init(){
                    await loadLocalDictionary();
                    startGame();
                }
                init();
            })();
        </script>
    </body>
</html>
